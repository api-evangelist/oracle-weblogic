naftiko: 1.0.0-alpha2
info:
  label: Oracle WebLogic Server Oracle WebLogic RESTful Management Services API — Edit Session
  description: 'Oracle WebLogic Server Oracle WebLogic RESTful Management Services API — Edit Session. 4 operations. Lead
    operation: Oracle WebLogic Server Activate pending configuration changes. Self-contained Naftiko capability covering one
    Oracle Weblogic business surface.'
  tags:
  - Oracle Weblogic
  - Edit Session
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ORACLE_WEBLOGIC_API_KEY: ORACLE_WEBLOGIC_API_KEY
capability:
  consumes:
  - type: http
    namespace: management-edit-session
    baseUri: http://localhost:7001/management/weblogic/latest
    description: Oracle WebLogic Server Oracle WebLogic RESTful Management Services API — Edit Session business capability.
      Self-contained, no shared references.
    resources:
    - name: edit-changeManager-activate
      path: /edit/changeManager/activate
      operations:
      - name: activatechanges
        method: POST
        description: Oracle WebLogic Server Activate pending configuration changes
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: edit-changeManager-cancelEdit
      path: /edit/changeManager/cancelEdit
      operations:
      - name: canceledit
        method: POST
        description: Oracle WebLogic Server Cancel the current edit session
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: edit-changeManager-startEdit
      path: /edit/changeManager/startEdit
      operations:
      - name: startedit
        method: POST
        description: Oracle WebLogic Server Start an edit session
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: edit-changeManager-undoUnactivatedChanges
      path: /edit/changeManager/undoUnactivatedChanges
      operations:
      - name: undounactivatedchanges
        method: POST
        description: Oracle WebLogic Server Undo all unactivated changes
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: basic
      username: '{{env.ORACLE_WEBLOGIC_USER}}'
      password: '{{env.ORACLE_WEBLOGIC_PASS}}'
  exposes:
  - type: rest
    namespace: management-edit-session-rest
    port: 8080
    description: REST adapter for Oracle WebLogic Server Oracle WebLogic RESTful Management Services API — Edit Session. One
      Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/edit/changemanager/activate
      name: edit-changemanager-activate
      description: REST surface for edit-changeManager-activate.
      operations:
      - method: POST
        name: activatechanges
        description: Oracle WebLogic Server Activate pending configuration changes
        call: management-edit-session.activatechanges
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/edit/changemanager/canceledit
      name: edit-changemanager-canceledit
      description: REST surface for edit-changeManager-cancelEdit.
      operations:
      - method: POST
        name: canceledit
        description: Oracle WebLogic Server Cancel the current edit session
        call: management-edit-session.canceledit
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/edit/changemanager/startedit
      name: edit-changemanager-startedit
      description: REST surface for edit-changeManager-startEdit.
      operations:
      - method: POST
        name: startedit
        description: Oracle WebLogic Server Start an edit session
        call: management-edit-session.startedit
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/edit/changemanager/undounactivatedchanges
      name: edit-changemanager-undounactivatedchanges
      description: REST surface for edit-changeManager-undoUnactivatedChanges.
      operations:
      - method: POST
        name: undounactivatedchanges
        description: Oracle WebLogic Server Undo all unactivated changes
        call: management-edit-session.undounactivatedchanges
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: management-edit-session-mcp
    port: 9090
    transport: http
    description: MCP adapter for Oracle WebLogic Server Oracle WebLogic RESTful Management Services API — Edit Session. One
      tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: oracle-weblogic-server-activate-pending
      description: Oracle WebLogic Server Activate pending configuration changes
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: management-edit-session.activatechanges
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: oracle-weblogic-server-cancel-current
      description: Oracle WebLogic Server Cancel the current edit session
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: management-edit-session.canceledit
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: oracle-weblogic-server-start-edit
      description: Oracle WebLogic Server Start an edit session
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: management-edit-session.startedit
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: oracle-weblogic-server-undo-all
      description: Oracle WebLogic Server Undo all unactivated changes
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: management-edit-session.undounactivatedchanges
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
