naftiko: 1.0.0-alpha2
info:
  label: Oracle WebLogic Server Oracle WebLogic RESTful Management Services API — Search
  description: 'Oracle WebLogic Server Oracle WebLogic RESTful Management Services API — Search. 3 operations. Lead operation:
    Oracle WebLogic Server Search the domain configuration tree. Self-contained Naftiko capability covering one Oracle Weblogic
    business surface.'
  tags:
  - Oracle Weblogic
  - Search
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ORACLE_WEBLOGIC_API_KEY: ORACLE_WEBLOGIC_API_KEY
capability:
  consumes:
  - type: http
    namespace: management-search
    baseUri: http://localhost:7001/management/weblogic/latest
    description: Oracle WebLogic Server Oracle WebLogic RESTful Management Services API — Search business capability. Self-contained,
      no shared references.
    resources:
    - name: domainConfig-search
      path: /domainConfig/search
      operations:
      - name: searchdomainconfigtree
        method: POST
        description: Oracle WebLogic Server Search the domain configuration tree
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: edit-search
      path: /edit/search
      operations:
      - name: searchedittree
        method: POST
        description: Oracle WebLogic Server Search the edit configuration tree
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: serverConfig-search
      path: /serverConfig/search
      operations:
      - name: searchserverconfigtree
        method: POST
        description: Oracle WebLogic Server Search the server configuration tree
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: basic
      username: '{{env.ORACLE_WEBLOGIC_USER}}'
      password: '{{env.ORACLE_WEBLOGIC_PASS}}'
  exposes:
  - type: rest
    namespace: management-search-rest
    port: 8080
    description: REST adapter for Oracle WebLogic Server Oracle WebLogic RESTful Management Services API — Search. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/domainconfig/search
      name: domainconfig-search
      description: REST surface for domainConfig-search.
      operations:
      - method: POST
        name: searchdomainconfigtree
        description: Oracle WebLogic Server Search the domain configuration tree
        call: management-search.searchdomainconfigtree
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/edit/search
      name: edit-search
      description: REST surface for edit-search.
      operations:
      - method: POST
        name: searchedittree
        description: Oracle WebLogic Server Search the edit configuration tree
        call: management-search.searchedittree
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/serverconfig/search
      name: serverconfig-search
      description: REST surface for serverConfig-search.
      operations:
      - method: POST
        name: searchserverconfigtree
        description: Oracle WebLogic Server Search the server configuration tree
        call: management-search.searchserverconfigtree
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: management-search-mcp
    port: 9090
    transport: http
    description: MCP adapter for Oracle WebLogic Server Oracle WebLogic RESTful Management Services API — Search. One tool
      per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: oracle-weblogic-server-search-domain
      description: Oracle WebLogic Server Search the domain configuration tree
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: management-search.searchdomainconfigtree
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: oracle-weblogic-server-search-edit
      description: Oracle WebLogic Server Search the edit configuration tree
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: management-search.searchedittree
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: oracle-weblogic-server-search-server
      description: Oracle WebLogic Server Search the server configuration tree
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: management-search.searchserverconfigtree
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
