naftiko: 1.0.0-alpha2
info:
  label: Oracle WebLogic Server Oracle WebLogic RESTful Management Services API — Machines
  description: 'Oracle WebLogic Server Oracle WebLogic RESTful Management Services API — Machines. 7 operations. Lead operation:
    Oracle WebLogic Server List all machines. Self-contained Naftiko capability covering one Oracle Weblogic business surface.'
  tags:
  - Oracle Weblogic
  - Machines
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ORACLE_WEBLOGIC_API_KEY: ORACLE_WEBLOGIC_API_KEY
capability:
  consumes:
  - type: http
    namespace: management-machines
    baseUri: http://localhost:7001/management/weblogic/latest
    description: Oracle WebLogic Server Oracle WebLogic RESTful Management Services API — Machines business capability. Self-contained,
      no shared references.
    resources:
    - name: edit-machines
      path: /edit/machines
      operations:
      - name: listmachines
        method: GET
        description: Oracle WebLogic Server List all machines
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createmachine
        method: POST
        description: Oracle WebLogic Server Create a new machine
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: edit-machines-machineName
      path: /edit/machines/{machineName}
      operations:
      - name: getmachine
        method: GET
        description: Oracle WebLogic Server Get a specific machine configuration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatemachine
        method: POST
        description: Oracle WebLogic Server Update a machine configuration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletemachine
        method: DELETE
        description: Oracle WebLogic Server Delete a machine
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: edit-machines-machineName-nodeManager
      path: /edit/machines/{machineName}/nodeManager
      operations:
      - name: getnodemanager
        method: GET
        description: Oracle WebLogic Server Get Node Manager configuration for a machine
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatenodemanager
        method: POST
        description: Oracle WebLogic Server Update Node Manager configuration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: basic
      username: '{{env.ORACLE_WEBLOGIC_USER}}'
      password: '{{env.ORACLE_WEBLOGIC_PASS}}'
  exposes:
  - type: rest
    namespace: management-machines-rest
    port: 8080
    description: REST adapter for Oracle WebLogic Server Oracle WebLogic RESTful Management Services API — Machines. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/edit/machines
      name: edit-machines
      description: REST surface for edit-machines.
      operations:
      - method: GET
        name: listmachines
        description: Oracle WebLogic Server List all machines
        call: management-machines.listmachines
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createmachine
        description: Oracle WebLogic Server Create a new machine
        call: management-machines.createmachine
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/edit/machines/{machinename}
      name: edit-machines-machinename
      description: REST surface for edit-machines-machineName.
      operations:
      - method: GET
        name: getmachine
        description: Oracle WebLogic Server Get a specific machine configuration
        call: management-machines.getmachine
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: updatemachine
        description: Oracle WebLogic Server Update a machine configuration
        call: management-machines.updatemachine
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletemachine
        description: Oracle WebLogic Server Delete a machine
        call: management-machines.deletemachine
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/edit/machines/{machinename}/nodemanager
      name: edit-machines-machinename-nodemanager
      description: REST surface for edit-machines-machineName-nodeManager.
      operations:
      - method: GET
        name: getnodemanager
        description: Oracle WebLogic Server Get Node Manager configuration for a machine
        call: management-machines.getnodemanager
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: updatenodemanager
        description: Oracle WebLogic Server Update Node Manager configuration
        call: management-machines.updatenodemanager
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: management-machines-mcp
    port: 9090
    transport: http
    description: MCP adapter for Oracle WebLogic Server Oracle WebLogic RESTful Management Services API — Machines. One tool
      per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: oracle-weblogic-server-list-all
      description: Oracle WebLogic Server List all machines
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: management-machines.listmachines
      outputParameters:
      - type: object
        mapping: $.
    - name: oracle-weblogic-server-create-new
      description: Oracle WebLogic Server Create a new machine
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: management-machines.createmachine
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: oracle-weblogic-server-get-specific
      description: Oracle WebLogic Server Get a specific machine configuration
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: management-machines.getmachine
      outputParameters:
      - type: object
        mapping: $.
    - name: oracle-weblogic-server-update-machine
      description: Oracle WebLogic Server Update a machine configuration
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: management-machines.updatemachine
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: oracle-weblogic-server-delete-machine
      description: Oracle WebLogic Server Delete a machine
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: management-machines.deletemachine
      outputParameters:
      - type: object
        mapping: $.
    - name: oracle-weblogic-server-get-node
      description: Oracle WebLogic Server Get Node Manager configuration for a machine
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: management-machines.getnodemanager
      outputParameters:
      - type: object
        mapping: $.
    - name: oracle-weblogic-server-update-node
      description: Oracle WebLogic Server Update Node Manager configuration
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: management-machines.updatenodemanager
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
