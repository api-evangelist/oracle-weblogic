specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Oracle WebLogic Server
providerId: oracle-weblogic
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Application Server
  - Java EE
  - Middleware
  - Oracle Cloud
description: >-
  Oracle WebLogic Server is delivered through three commercial paths.
  On-premises (or BYOL on OCI) it is licensed by edition (WebLogic Standard,
  WebLogic Enterprise, WebLogic Suite) per processor or per named-user-plus
  on the Oracle Technology Global Price List, with separately purchased
  annual support and update licenses. WebLogic Server for OCI is offered as
  a Marketplace stack (UCM / paid) where customers either bring an existing
  license (BYOL) or pay per OCPU-hour for the included WebLogic license,
  layered on top of the underlying OCI compute, block storage, and
  networking. There is no free or per-API public tier; the WebLogic
  RESTful Management Services, monitoring, deployment, WLST, and JMX APIs
  are all included with any active edition. Engage Oracle Sales for the
  per-processor / per-OCPU rate.
sources:
  - https://www.oracle.com/java/weblogic/
  - https://docs.oracle.com/en/middleware/standalone/weblogic-server/
  - https://www.oracle.com/cloud/price-list/
notes: >-
  Oracle blocks programmatic fetches of www.oracle.com pricing pages (HTTP 403).
  Plan structure preserved as one on-premises edition plan plus an OCI
  Marketplace usage plan and an enterprise tier; replace per-processor and
  per-OCPU prices with the verified Oracle Technology / Cloud Price List
  values when available.
plans:
  - id: oracle-weblogic-on-premises
    name: WebLogic Server (On-Premises)
    type: subscription
    description: >-
      On-premises Oracle WebLogic Server licensed by edition (Standard,
      Enterprise, Suite) per processor or per named-user-plus on the Oracle
      Technology Global Price List, with separately purchased annual
      support and update licenses.
    entries:
      - label: Per-Processor License (Standard / Enterprise / Suite)
        name: per_processor_license
        type: subscription
        metric: processor
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
      - label: Named User Plus License
        name: named_user_plus
        type: subscription
        metric: user
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: true
      - label: Annual Support and Update License
        name: support_update
        type: subscription
        metric: percent_of_license
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: WebLogic RESTful Management Services API
      - name: WebLogic Monitoring and Diagnostics API
      - name: WebLogic Deployment API
      - name: WebLogic WLST (WebLogic Scripting Tool) API
      - name: WebLogic JMX API
  - id: oracle-weblogic-oci-marketplace
    name: WebLogic Server for OCI (Marketplace)
    type: usage-based
    description: >-
      Oracle WebLogic Server for OCI Marketplace stack. Customers either
      bring an existing WebLogic license (BYOL) or pay per OCPU-hour for the
      included license, on top of the underlying OCI compute, block
      storage, and networking charges.
    entries:
      - label: WebLogic OCPU (license included)
        name: weblogic_ocpu_license_included
        type: metered
        metric: ocpu-hour
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: see https://www.oracle.com/cloud/price-list/
        userMultiplied: false
      - label: OCI Compute (BYOL)
        name: oci_compute_byol
        type: metered
        metric: ocpu-hour
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: see https://www.oracle.com/cloud/price-list/
        userMultiplied: false
      - label: OCI Block Storage
        name: oci_block_storage
        type: metered
        metric: gb-month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: see https://www.oracle.com/cloud/price-list/
        userMultiplied: false
    elements:
      - name: WebLogic RESTful Management Services API
      - name: WebLogic Monitoring and Diagnostics API
      - name: WebLogic Deployment API
      - name: WebLogic WLST (WebLogic Scripting Tool) API
      - name: WebLogic JMX API
  - id: oracle-weblogic-enterprise
    name: Enterprise Agreement
    type: enterprise
    description: >-
      Negotiated enterprise agreement combining on-premises WebLogic
      licenses with OCI capacity, with contractual SLAs, premier support,
      and named technical account management.
    entries:
      - label: Negotiated License Volume
        name: negotiated_licenses
        type: subscription
        metric: bundle
        limit: -1
        timeFrame: year
        geo: configurable
        unit: 1
        price: custom
        userMultiplied: false
    elements:
      - name: WebLogic RESTful Management Services API
      - name: WebLogic Monitoring and Diagnostics API
      - name: WebLogic Deployment API
      - name: WebLogic WLST (WebLogic Scripting Tool) API
      - name: WebLogic JMX API
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
