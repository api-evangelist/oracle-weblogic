components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: >-
        HTTP Basic authentication using WebLogic Server credentials. Users
        must have appropriate roles (Admin, Operator, Deployer, or Monitor).
  parameters:
    XRequestedBy:
      name: X-Requested-By
      in: header
      required: true
      description: CSRF protection header required for POST and DELETE requests
      schema:
        type: string
        example: MyClient
    Fields:
      name: fields
      in: query
      description: Comma-separated list of property names to include in the response
      schema:
        type: string
      example: name,listenPort
    ExcludeFields:
      name: excludeFields
      in: query
      description: Comma-separated list of property names to exclude from the response
      schema:
        type: string
    Links:
      name: links
      in: query
      description: >-
        Comma-separated list of link relations to include (e.g., self,
        parent, canonical). Use 'none' to exclude all links.
      schema:
        type: string
      example: none
    ExcludeLinks:
      name: excludeLinks
      in: query
      description: Comma-separated list of link relations to exclude
      schema:
        type: string
    ExpandedValues:
      name: expandedValues
      in: query
      description: >-
        When true, properties are returned as objects with set and value
        fields indicating whether the property has been explicitly set.
      schema:
        type: boolean
        default: false
    SaveChanges:
      name: saveChanges
      in: query
      description: >-
        When false, changes are saved to the edit session but not validated
        until explicitly saved or activated.
      schema:
        type: boolean
        default: true
    ServerName:
      name: serverName
      in: path
      required: true
      description: Name of the WebLogic Server instance
      schema:
        type: string
    ClusterName:
      name: clusterName
      in: path
      required: true
      description: Name of the cluster
      schema:
        type: string
    MachineName:
      name: machineName
      in: path
      required: true
      description: Name of the machine
      schema:
        type: string
    ResourceName:
      name: resourceName
      in: path
      required: true
      description: Name of the resource
      schema:
        type: string
    JMSServerName:
      name: jmsServerName
      in: path
      required: true
      description: Name of the JMS server
      schema:
        type: string
    JMSResourceName:
      name: jmsResourceName
      in: path
      required: true
      description: Name of the JMS system resource
      schema:
        type: string
    AppName:
      name: appName
      in: path
      required: true
      description: Name of the application deployment
      schema:
        type: string
    RealmName:
      name: realmName
      in: path
      required: true
      description: Name of the security realm
      schema:
        type: string
    ProviderName:
      name: providerName
      in: path
      required: true
      description: Name of the authentication provider
      schema:
        type: string
    PartitionName:
      name: partitionName
      in: path
      required: true
      description: Name of the domain partition
      schema:
        type: string
    EditSession:
      name: weblogic.edit.session
      in: header
      description: >-
        Specifies the edit session to use. Use 'default' for the default
        session or a custom session name.
      schema:
        type: string
  responses:
    BadRequest:
      description: Invalid request - malformed parameters or validation errors
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Authentication required or invalid credentials
    Forbidden:
      description: User does not have the required role
    NotFound:
      description: Requested resource does not exist
    MethodNotAllowed:
      description: HTTP method not supported for this resource
  schemas:
    Link:
      type: object
      properties:
        rel:
          type: string
          description: Link relation type
        href:
          type: string
          format: uri
          description: URL of the linked resource
        title:
          type: string
          description: Human-readable title for the link
    Identity:
      type: object
      properties:
        identity:
          type: array
          items:
            type: string
          description: Bean identity path as an array of path segments
    Message:
      type: object
      properties:
        severity:
          type: string
          enum:
            - SUCCESS
            - WARNING
            - FAILURE
        field:
          type: string
          description: Property name associated with this message
        message:
          type: string
          description: Detailed message text
    ErrorResponse:
      type: object
      properties:
        type:
          type: string
        title:
          type: string
          enum:
            - ERRORS
        status:
          type: integer
        wls:errorsDetails:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
              title:
                type: string
              detail:
                type: string
              o:errorPath:
                type: string
    Domain:
      type: object
      properties:
        identity:
          type: array
          items:
            type: string
        name:
          type: string
          description: Domain name
        configurationVersion:
          type: string
          description: Domain configuration version
        domainVersion:
          type: string
          description: WebLogic Server version
        adminServerName:
          type: string
          description: Name of the administration server
        productionModeEnabled:
          type: boolean
          description: Whether the domain is in production mode
        links:
          type: array
          items:
            $ref: '#/components/schemas/Link'
    Server:
      type: object
      properties:
        identity:
          type: array
          items:
            type: string
        name:
          type: string
          description: Server name
        listenPort:
          type: integer
          description: Listen port for the server
          default: 7001
        listenAddress:
          type: string
          description: IP address or hostname the server listens on
        listenPortEnabled:
          type: boolean
          description: Whether the non-SSL listen port is enabled
          default: true
        SSLListenPort:
          type: integer
          description: SSL listen port
        administrationPort:
          type: integer
          description: Administration port
        defaultProtocol:
          type: string
          description: Default network protocol
          enum:
            - t3
            - t3s
            - http
            - https
            - iiop
