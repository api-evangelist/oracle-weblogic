specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Oracle WebLogic Server
providerId: oracle-weblogic
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Application Server
  - Java EE
  - Middleware
  - Oracle Cloud
  - Rate Limiting
description: >-
  Oracle WebLogic Server is a customer-deployed Java application server; its
  RESTful Management Services, Monitoring and Diagnostics (WLDF), Deployment,
  WLST, and JMX APIs do not enforce a centrally-published per-second or
  per-minute rate-limit table. Throughput is bound by the deployed WebLogic
  cluster sizing (managed servers, JVM heap, work-manager configuration) and
  by the hosting OCI compute or on-premises hardware. Customer-deployed
  WebLogic instances may further apply WebLogic Work Managers, request
  classes, and Overload Protection settings to throttle inbound traffic.
sources:
  - https://docs.oracle.com/en/middleware/standalone/weblogic-server/
  - https://docs.oracle.com/en/middleware/standalone/weblogic-server/14.1.1.0/wlach/
notes: >-
  No public per-tier RPS/RPM numbers are published. WebLogic deployments are
  capacity-planned per managed server, with rate control implemented via
  Work Managers, Overload Protection, and any fronting load balancer / API
  gateway.
responseCodes:
  unauthorized: 401
  forbidden: 403
  notFound: 404
  serverError: 500
  serviceUnavailable: 503
limits:
  - name: RESTful Management Services Throughput
    scope: managed_server
    metric: varies
    limit: bound by managed-server JVM heap and work-manager threads
    notes: >-
      Throughput is governed by the deployed managed server's JVM heap,
      thread-pool / work-manager configuration, and Overload Protection
      settings.
  - name: Application Request Throughput
    scope: cluster
    metric: varies
    limit: bound by cluster sizing and Work Manager configuration
    notes: >-
      Application throughput is bound by the WebLogic cluster's combined
      thread-pool capacity and any Work Manager max-threads-constraint or
      capacity policy.
  - name: JMX / WLST Operations
    scope: domain
    metric: concurrent_operations
    limit: bound by Admin Server capacity
    notes: >-
      JMX MBean operations and WLST scripts are processed by the Admin
      Server; sustained operations should be paced to avoid saturating the
      Admin Server.
policies:
  - name: Capacity-Bound Throttling
    description: >-
      Throughput limits are determined by the deployed WebLogic cluster
      sizing and by Work Manager / Overload Protection configuration rather
      than a published per-tenancy rate-limit table.
  - name: Backoff Strategy
    description: >-
      Clients should implement exponential backoff with jitter on 5xx
      responses; honor any Retry-After header when present.
  - name: Work Manager Configuration
    description: >-
      WebLogic administrators should use Work Managers, request classes,
      and max-threads / min-threads constraints to apply per-application
      rate control rather than relying on a global throttle.
  - name: Overload Protection
    description: >-
      Configure WebLogic Overload Protection (Stuck-Thread Max-Time, Failure
      Action) to gracefully shed traffic during sustained overload events.
  - name: API Gateway Pattern
    description: >-
      Customers exposing WebLogic-hosted APIs to third parties should front
      them with an API gateway (Oracle API Platform, Apigee, Kong) and
      apply rate limits there.
maintainers:
