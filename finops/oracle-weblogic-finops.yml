specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Oracle WebLogic Server
providerId: oracle-weblogic
publisherName: Oracle America, Inc.
serviceCategory: Application Server / Middleware
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Application Server
  - Java EE
  - Middleware
  - Oracle Cloud
  - FinOps
  - FOCUS
description: >-
  FOCUS-aligned FinOps view for Oracle WebLogic Server: contractual Oracle
  Technology licenses (per-processor or NUP, by edition Standard / Enterprise /
  Suite) plus the underlying infrastructure cost (on-premises hardware, OCI
  compute with WebLogic Marketplace license-included or BYOL, block storage,
  egress). Management and application APIs are bundled with the license.
sources:
  - https://www.oracle.com/java/weblogic/
  - https://docs.oracle.com/en/middleware/standalone/weblogic-server/
  - https://www.oracle.com/cloud/price-list/
notes: >-
  No per-API meter exists. Track contractual license counts per edition and
  metric, plus underlying OCI / on-premises infrastructure cost for the
  WebLogic deployment; reconcile annually against the Oracle support and
  update license invoice.
billingModel:
  pricingCategory: BYOL + License-Included (OCI Compute)
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
    - Tax
    - Adjustment
    - Credit
focusColumns:
  ServiceName: Oracle WebLogic Server
  ServiceCategory: Application Server / Middleware
  ProviderName: Oracle
  PublisherName: Oracle America, Inc.
  InvoiceIssuerName: Oracle America, Inc.
  BillingCurrency: USD
  PricingCategory: License + Usage
  ChargeCategory: Purchase
meters:
  - name: weblogic_per_processor_license
    description: Per-processor WebLogic licenses contracted with Oracle
    unit: processor
    aggregation: max
    dimensions:
      - edition
      - environment
  - name: weblogic_named_user_plus_license
    description: Named User Plus WebLogic licenses contracted with Oracle
    unit: user
    aggregation: max
    dimensions:
      - edition
      - environment
  - name: weblogic_oci_ocpu_hours_license_included
    description: OCPU-hours consumed by WebLogic Marketplace stacks with included license
    unit: ocpu-hour
    aggregation: sum
    dimensions:
      - edition
      - region
      - tag
  - name: oci_compute_ocpu_hours
    description: OCPU-hours consumed by BYOL WebLogic deployments on OCI compute
    unit: ocpu-hour
    aggregation: sum
    dimensions:
      - region
      - shape
      - tag
  - name: oci_block_storage_gb_month
    description: Block storage attached to WebLogic hosts
    unit: GB-month
    aggregation: sum
    dimensions:
      - region
      - tag
  - name: support_and_update_license
    description: Annual support and update license fee for on-premises WebLogic
    unit: usd-annual
    aggregation: sum
principles:
  - name: Visibility
    description: >-
      Use OCI Cost Analysis with cost-tracking tags applied to each
      WebLogic Marketplace stack and BYOL compute instance; reconcile
      annually against the Oracle Technology license count and support
      renewal invoice.
  - name: Allocation
    description: >-
      Tag each WebLogic environment (dev, test, prod, DR) and allocate
      license + infrastructure cost to the consuming application or
      product team.
  - name: Optimization
    description: >-
      Right-size managed-server JVM heaps and OCPU shapes to actual
      throughput, consolidate low-traffic applications onto shared domains
      where licensing terms permit, prefer BYOL on OCI when existing
      license entitlement is available, and schedule non-production
      instances to stop outside business hours.
  - name: Accountability
    description: >-
      Pair the WebLogic platform owner with the Java applications team and
      a finance partner; review license utilization and OCI consumption
      monthly, and the Oracle support and update renewal annually.
